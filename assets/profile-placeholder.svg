<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161D2B"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FE3C1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4FE3C1" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 0H40M0 0V40" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#grid)"/>
  <ellipse cx="300" cy="780" rx="340" ry="260" fill="url(#glow)"/>

  <!-- monogram -->
  <text x="300" y="460" text-anchor="middle"
        font-family="'Big Shoulders Display', Arial Narrow, sans-serif"
        font-weight="800" font-size="220" fill="#3A4356">KG</text>

  <!-- scanlines -->
  <g opacity="0.5">
    <line x1="0" y1="200" x2="600" y2="200" stroke="#ffffff" stroke-opacity="0.04"/>
    <line x1="0" y1="600" x2="600" y2="600" stroke="#ffffff" stroke-opacity="0.04"/>
  </g>
</svg>
